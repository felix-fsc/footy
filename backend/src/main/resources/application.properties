spring.application.name=footy-backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/footy}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:footy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:footy}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:change-this-development-secret-32-chars-minimum}